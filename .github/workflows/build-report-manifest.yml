name: Build Report Manifest

on:
  push:
    paths:
      - "reports/**/*.html"
      - "scripts/build_reports_manifest.py"
      - ".github/workflows/build-report-manifest.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-manifest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build manifest
        run: python scripts/build_reports_manifest.py --base-dir .

      - name: Commit manifest if changed
        run: |
          if git diff --quiet -- reports-manifest.json; then
            echo "No manifest changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports-manifest.json
          git commit -m "Update reports manifest"
          git push
